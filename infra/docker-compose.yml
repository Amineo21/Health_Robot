services:
  mysql:
    image: mysql:8.4
    container_name: robot_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-health_robot}
      MYSQL_USER: ${MYSQL_USER:-health_robot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-health_robot}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-health_robot_root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    container_name: robot_backend
    ports:
      - "4000:4000"
    environment:
      - MQTT_BROKER=mqtt://mosquitto:1883
      - MQTT_ENABLED=true
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ROBOT_ROSBRIDGE_ENABLED=${ROBOT_ROSBRIDGE_ENABLED:-true}
      - ROBOT_ROSBRIDGE_URL=${ROBOT_ROSBRIDGE_URL:-ws://10.10.220.180:9090}
      - ROBOT_DASHBOARD_URL=${ROBOT_DASHBOARD_URL:-http://10.10.220.180:8080}
      - ROBOT_MAPS_DIRECTORY=${ROBOT_MAPS_DIRECTORY:-/root/maps}
      - ROBOT_BASE_X=${ROBOT_BASE_X:-0.0}
      - ROBOT_BASE_Y=${ROBOT_BASE_Y:-0.0}
      - ROBOT_BASE_YAW=${ROBOT_BASE_YAW:-0.0}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-health_robot}:${MYSQL_PASSWORD:-health_robot}@mysql:3306/${MYSQL_DATABASE:-health_robot}?charset=utf8mb4
      - USER_REPOSITORY_BACKEND=database
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-me}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-admin@health-robot.local}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-admin}
      - INITIAL_ADMIN_NAME=${INITIAL_ADMIN_NAME:-Admin}
    depends_on:
      mosquitto:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    container_name: robot_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:4000}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
    name: health_robot_mysql_data
    driver: local
