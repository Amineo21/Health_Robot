kind = "web"
previewPath = "/"
title = "EHPAD Robot Control Platform"
version = "1.0.0"
id = "artifacts/ehpad-robot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20696
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ehpad-robot run dev"

[services.env]
PORT = "20696"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ehpad-robot", "run", "build"]
publicDir = "artifacts/ehpad-robot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
