openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: EHPAD Robot Control Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: missions
    description: Mission operations
  - name: robot
    description: Robot status operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /robot/status:
    get:
      operationId: getRobotStatus
      tags: [robot]
      summary: Get robot status
      responses:
        "200":
          description: Robot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RobotStatus"
  /missions:
    get:
      operationId: getMissions
      tags: [missions]
      summary: Get all missions
      responses:
        "200":
          description: List of missions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mission"
    post:
      operationId: createMission
      tags: [missions]
      summary: Create a new mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMissionRequest"
      responses:
        "201":
          description: Created mission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
  /missions/{id}:
    patch:
      operationId: updateMissionStatus
      tags: [missions]
      summary: Update mission status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMissionRequest"
      responses:
        "200":
          description: Updated mission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RobotStatus:
      type: object
      properties:
        status:
          type: string
          enum: [idle, moving, charging, delivering, error]
        battery:
          type: number
        positionX:
          type: number
        positionY:
          type: number
        speed:
          type: number
        connectionQuality:
          type: number
        activeMission:
          type: string
          nullable: true
        deliveriesToday:
          type: number
        lastUpdated:
          type: string
      required:
        - status
        - battery
        - positionX
        - positionY
        - speed
        - connectionQuality
        - activeMission
        - deliveriesToday
        - lastUpdated
    Mission:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [medical_delivery, meal_distribution]
        destination:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled, failed]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        notes:
          type: string
          nullable: true
        startTime:
          type: string
          nullable: true
        completedTime:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - type
        - destination
        - status
        - priority
        - notes
        - startTime
        - completedTime
        - createdAt
    CreateMissionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [medical_delivery, meal_distribution]
        destination:
          type: string
        priority:
          type: string
          enum: [low, medium, high, urgent]
        notes:
          type: string
          nullable: true
      required:
        - type
        - destination
        - priority
    UpdateMissionRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled, failed]
      required:
        - status
