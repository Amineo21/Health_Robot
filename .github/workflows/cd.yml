name: CD - Deploy Health Robot

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Verify Terraform Infra
        run: |
          cd infra/terraform
          echo "✅ Réseau: health_robot_network"
          echo "✅ Volumes: mosquitto_data, mosquitto_config"
          echo "📋 Infra IaC prête pour VM staging"
      
      - name: Verify App Deployment
        run: |
          cd infra
          echo "✅ docker-compose.yml: mosquitto + backend + frontend"
          echo "🚀 Prêt pour déploiement automatique"
          echo "TODO: SSH vers VM + docker compose up -d"
      
      - name: Notify Success
        run: |
          echo "🎉 Pipeline CD Health Robot terminée !"
          echo "Prochaines étapes: VM cloud + déploiement réel"