# .github/workflows/docker.yml
name: Build Docker images

# On déclenche le workflow sur toutes les branches sauf main
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Installer Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Générer le fichier .env (gitignoré, absent sur le runner)
      #    Valeurs de dev/CI uniquement — pas de secrets réels.
      - name: Create infra/.env
        run: |
          cat > infra/.env <<'EOF'
          MQTT_BROKER=mqtt://mosquitto:1883
          DB_HOST=robot_db
          DB_PORT=3306
          MYSQL_USER=robot
          MYSQL_DATABASE=health_robot
          MYSQL_PASSWORD=robot_password
          MYSQL_ROOT_PASSWORD=root_password
          MQTT_HOST=mosquitto
          MQTT_PORT=1883
          EOF

      # 4. Construire les images backend et frontend
      - name: Build Docker images
        run: |
          docker compose -f infra/docker-compose.yml build

      # 5. Tester si les containers démarrent correctement
      - name: Test Docker containers
        run: |
          docker compose -f infra/docker-compose.yml up -d
          docker ps
          docker compose -f infra/docker-compose.yml down
