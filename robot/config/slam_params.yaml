slam_toolbox:
  ros__parameters:
    # Mode cartographie en temps réel (à utiliser avec téléopération)
    mode: mapping

    # Topics du Lidar et odométrie
    scan_topic: /scan
    odom_frame: odom
    map_frame: map
    base_frame: base_link

    # Résolution de la carte (5cm par pixel)
    resolution: 0.05
    max_laser_range: 12.0

    # Fréquence de mise à jour de la carte
    map_update_interval: 5.0

    # Sauvegarde automatique
    do_loop_closing: true
    loop_search_maximum_distance: 4.0
