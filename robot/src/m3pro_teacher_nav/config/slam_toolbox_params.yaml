# ============================================================
# slam_toolbox parameters for Yahboom M3 Pro
# Uses /scan_multi (TF-correct 360-deg scan) produced by
# ira_laser_tools/laserscan_multi_merger from the Yahboom bringup.
# ============================================================
slam_toolbox:
  ros__parameters:
    # ---------- solver ----------
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ---------- frames ----------
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan_multi
    use_scan_matching: true
    use_scan_barycenter: true

    # ---------- map ----------
    map_update_interval: 3.0
    resolution: 0.05
    max_laser_range: 3.5
    # Jetson Nano is CPU-bound — process fewer scans, each more thoroughly.
    # Previous 0.5 caused "Message Filter queue full" drops that produced pose
    # jumps when SLAM finally caught up.
    minimum_time_interval: 1.0
    transform_timeout: 1.5
    tf_buffer_duration: 30.0

    # ---------- thresholds for new scans ----------
    # Raised from 0.3 — fewer but higher-quality scan insertions cuts the
    # "drift then jump" pattern when CPU saturates.
    minimum_travel_distance: 0.5
    minimum_travel_heading: 0.5

    # ---------- scan matching ----------
    # Smaller queue = less backlog, fewer late-processed scans that snap map.
    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 3.5
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0

    # ---------- correlation / loop closure ----------
    # Loop closure on a featureless indoor environment + a noisy, drifting
    # /odom often misfires — it snaps the whole pose graph to a WRONG match.
    # Turning it off for now; we rely on continuous scan matching only.
    do_loop_closing: false
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ---------- performance (tuned for Jetson) ----------
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # ---------- mode ----------
    mode: mapping
    # Set to "localization" and provide map_file_name to localize on existing map
    # map_file_name: /path/to/saved_map
    # map_start_at_dock: true
